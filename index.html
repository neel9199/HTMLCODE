<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Futuristic Signup Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(
        135deg,
        #050816 0%,
        #0a0f2c 40%,
        #1b0636 70%,
        #050816 100%
    );
    overflow:hidden;
    position:relative;
}

/* Background Glow */

body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#ff00ff;
    filter:blur(150px);
    opacity:0.3;
    top:-100px;
    left:-100px;
    border-radius:50%;
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:#00aaff;
    filter:blur(150px);
    opacity:0.3;
    bottom:-100px;
    right:-100px;
    border-radius:50%;
}

/* Main Container */

.container{
    width:380px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.1);
    backdrop-filter:blur(10px);
    padding:35px;
    border-radius:20px;
    box-shadow:0 0 25px rgba(0,0,0,0.5);
    position:relative;
    z-index:10;
}

/* Logo */

.logo{
    text-align:center;
    margin-bottom:20px;
}

.logo img{
    width:120px;
    height:auto;
    border-radius:15px;
    animation:float 3s ease-in-out infinite;
    box-shadow:0 0 25px #b84dff;
}

/* Floating Animation */

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-10px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* Heading */

h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-size:35px;
}

/* Input Fields */

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.1);
    color:white;
    font-size:16px;
}

.input-box input::placeholder{
    color:#cccccc;
}

/* Button */

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:30px;
    background:linear-gradient(90deg,#8a2be2,#00bfff);
    color:white;
    font-size:17px;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}

button:hover{
    transform:scale(1.03);
    box-shadow:0 0 20px #b84dff;
}

/* Text */

p{
    text-align:center;
    margin-top:18px;
    color:#cccccc;
}

a{
    color:#00bfff;
    text-decoration:none;
    font-weight:bold;
    cursor:pointer;
}

/* Forms */

.form{
    display:none;
}

#signup-form{
    display:block;
}

</style>

</head>
<body>

<div class="container">

    <!-- Signup Form -->

    <div id="signup-form" class="form">

        <!-- Logo -->
        <div class="logo">
            <img src="AI Realistic Art.jpeg" alt="Robot Logo">
        </div>

        <h2>Create Account</h2>

        <div class="input-box">
            <input type="text" placeholder="First Name">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Last Name">
        </div>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <button>Create Account</button>

        <p>
            Already have an account?
            <a onclick="showLogin()">Sign In</a>
        </p>

    </div>

    <!-- Login Form -->

    <div id="login-form" class="form">

        <!-- Logo -->
        <div class="logo">
            <img src="AI Realistic Art.jpeg" alt="Robot Logo">
        </div>

        <h2>Sign In</h2>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <button>Login</button>

        <p>
            Don't have an account?
            <a onclick="showSignup()">Create Account</a>
        </p>

    </div>

</div>

<script>

function showLogin(){

    document.getElementById("signup-form").style.display = "none";

    document.getElementById("login-form").style.display = "block";
}

function showSignup(){

    document.getElementById("login-form").style.display = "none";

    document.getElementById("signup-form").style.display = "block";
}

</script>

</body>
</html>
